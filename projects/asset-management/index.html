<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>자산운용 학습서 — 비전공자를 위한 14단원 + 부록 3편</title>
  <meta name="description" content="비전공자를 위한 자산운용 학습서. 포트폴리오 이론부터 팩터 모델·ML 자산가격결정까지 14단원과 수학·ML 부록 3편으로 구성된 체계적 학습 가이드.">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Noto+Serif+KR:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg-toc: #fafaf9;
      --bg-reader: #ffffff;
      --bg-tint: #f5f5f4;
      --text-primary: #1c1917;
      --text-secondary: #57534e;
      --text-muted: #a8a29e;
      --accent: #44403c;
      --border: #e7e5e4;
      --border-light: #d6d3d1;
      --code-bg: #292524;
      --code-text: #e7e5e4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-toc);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Progress Bar ── */
    #progress-bar {
      position: fixed; top: 0; left: 0; height: 2px; z-index: 9999;
      background: var(--accent);
      width: 0%; transition: width 80ms linear;
      opacity: 0; pointer-events: none;
    }
    #progress-bar.visible { opacity: 1; }

    /* ══════════════════════════════════════
       TOC VIEW
       ══════════════════════════════════════ */
    #toc-view {
      min-height: 100vh;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    #toc-view.hidden {
      opacity: 0; pointer-events: none; position: absolute; transform: translateY(-20px);
    }
    .toc-home-link {
      position: fixed;
      top: 1.5rem;
      left: 1.5rem;
      z-index: 30;
      font-size: 0.78rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .toc-home-link:hover { color: var(--text-primary); }

    /* Hero */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 3rem 2rem;
    }
    .hero-inner { max-width: 600px; }
    .hero-label {
      display: inline-block; font-size: 0.68rem; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--text-muted);
      margin-bottom: 3rem;
    }
    .hero h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 700; line-height: 1.4;
      letter-spacing: -0.03em; margin-bottom: 1rem;
    }
    .hero-subtitle {
      font-size: 1rem; color: var(--text-secondary);
      font-weight: 300; line-height: 1.8; margin-bottom: 3.5rem;
    }
    .hero-meta {
      display: flex; justify-content: center; gap: 3rem;
    }
    .hero-meta-item { text-align: center; }
    .hero-meta-num {
      font-family: 'Noto Serif KR', serif;
      font-size: 2rem; font-weight: 700; color: var(--text-primary);
      display: block; line-height: 1.2;
    }
    .hero-meta-label {
      font-size: 0.72rem; color: var(--text-muted);
      letter-spacing: 0.05em; margin-top: 0.25rem; display: block;
    }
    .scroll-hint {
      position: absolute; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      color: var(--text-muted); font-size: 0.65rem; letter-spacing: 0.12em;
      animation: drift 2.5s ease-in-out infinite;
    }
    @keyframes drift {
      0%,100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(6px); }
    }

    /* Chapter List — 카드 그리드 */
    .chapter-list-section {
      max-width: 1180px; margin: 0 auto;
      padding: 0 2rem 6rem;
    }
    .part-group { margin-bottom: 3rem; }
    .part-label {
      font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 1.2rem;
      padding-bottom: 0.8rem; border-bottom: 1px solid var(--border);
    }

    /* 카드 그리드 — 모바일 1열, 태블릿 2열, 데스크탑 3열 */
    .chapter-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }
    @media (min-width: 641px) {
      .chapter-grid { grid-template-columns: repeat(2, 1fr); gap: 1.1rem; }
    }
    @media (min-width: 1024px) {
      .chapter-grid { grid-template-columns: repeat(3, 1fr); gap: 1.2rem; }
    }

    .chapter-card {
      display: flex;
      flex-direction: column;
      background: var(--bg-reader);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      text-decoration: none;
    }
    .chapter-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.07);
      border-color: var(--border-light);
    }
    .chapter-card:hover .card-title { color: var(--accent); }

    .card-thumb {
      width: 100%; aspect-ratio: 16 / 9;
      background: var(--bg-tint);
      display: flex; align-items: center; justify-content: center;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    .card-thumb img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center;
      transition: transform 0.4s ease;
    }
    .chapter-card:hover .card-thumb img { transform: scale(1.04); }
    .card-thumb-empty {
      font-family: 'Noto Serif KR', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--border-light);
    }

    .card-info {
      padding: 1rem 1.1rem 1.1rem;
      flex: 1;
      display: flex; flex-direction: column;
    }
    .card-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }
    .card-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.02rem; font-weight: 600;
      color: var(--text-primary);
      line-height: 1.4;
      margin-bottom: 0.4rem;
      transition: color 0.2s ease;
    }
    .card-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      line-height: 1.55;
      flex: 1;
    }

    /* TOC Footer */
    .toc-footer {
      max-width: 640px; margin: 0 auto;
      padding: 2rem 2rem 4rem;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .toc-footer a {
      font-size: 0.8rem; color: var(--text-muted);
      text-decoration: none; transition: color 0.2s;
    }
    .toc-footer a:hover { color: var(--accent); }
    .toc-footer-count {
      font-size: 0.75rem; color: var(--text-muted);
    }

    /* ══════════════════════════════════════
       READER VIEW
       ══════════════════════════════════════ */
    #reader-view {
      display: none; background: var(--bg-reader);
      min-height: 100vh;
    }
    #reader-view.active { display: block; }

    /* Top Bar */
    .reader-topbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255,255,255,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      height: 52px; display: flex; align-items: center;
      padding: 0 1.5rem;
    }
    .topbar-back {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 1.1rem;
      padding: 0.4rem; margin-right: 1rem;
      transition: color 0.2s; display: flex; align-items: center;
      flex-shrink: 0;
    }
    .topbar-back:hover { color: var(--text-primary); }
    .topbar-title {
      flex: 1; font-size: 0.85rem; color: var(--text-secondary);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .topbar-home {
      font-size: 0.76rem; color: var(--text-muted);
      text-decoration: none; white-space: nowrap;
      margin-left: 0.75rem;
      transition: color 0.2s;
      flex-shrink: 0;
    }
    .topbar-home:hover { color: var(--text-primary); }
    .topbar-chapter-num {
      font-size: 0.78rem; color: var(--text-muted);
      margin-left: 1rem; white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .topbar-toc-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-secondary); font-size: 1.1rem;
      padding: 0.4rem; margin-left: 0.8rem;
      transition: color 0.2s; display: flex; align-items: center;
      flex-shrink: 0;
    }
    .topbar-toc-btn:hover { color: var(--text-primary); }

    /* TOC Drawer */
    .toc-drawer-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(28,25,23,0.3);
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease;
    }
    .toc-drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .toc-drawer {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 201;
      width: 320px; max-width: 85vw;
      background: var(--bg-toc); border-left: 1px solid var(--border);
      transform: translateX(100%); transition: transform 0.3s ease;
      overflow-y: auto; padding: 1.5rem;
    }
    .toc-drawer.open { transform: translateX(0); }
    .toc-drawer-title {
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 1.2rem;
      padding-bottom: 0.8rem; border-bottom: 1px solid var(--border);
    }
    .toc-drawer-item {
      display: flex; align-items: baseline; gap: 0.8rem;
      padding: 0.6rem 0.5rem; cursor: pointer;
      border-radius: 4px; transition: background 0.15s;
      font-size: 0.88rem; color: var(--text-secondary);
    }
    .toc-drawer-item:hover { background: var(--bg-tint); }
    .toc-drawer-item.active { color: var(--text-primary); font-weight: 500; background: var(--bg-tint); }
    .toc-drawer-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--text-muted);
      min-width: 1.5rem; text-align: right;
    }

    /* ── Reader Shell — 데스크탑 3-pane Grid ── */
    .reader-shell {
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    /* ── 본문 상단 컨텍스트 바 (데스크탑) — "현재 13/17 · 시계열 모멘텀" ── */
    .reader-context-bar {
      display: none;
    }

    /* Reading Column (가운데 본문) */
    .reader-column {
      max-width: 760px; margin: 0 auto; width: 100%;
      padding: 80px 2rem 4rem;
    }

    /* ── 좌측 사이드바 (데스크탑) ──
       기본은 56px collapsed (번호만), hover 시 280px로 펼침 */
    .reader-sidebar {
      display: none;
      position: sticky; top: 0;
      height: 100vh; width: 56px;
      background: var(--bg-toc);
      border-right: 1px solid var(--border);
      overflow: hidden;
      padding: 1.5rem 0 2rem;
      font-size: 0.86rem;
      transition: width 0.25s ease, box-shadow 0.25s ease, padding 0.25s ease;
      z-index: 30;
    }
    .reader-sidebar:hover {
      width: 280px;
      overflow-y: auto;
      padding: 1.8rem 1.2rem 2rem;
      box-shadow: 4px 0 24px rgba(0,0,0,0.08);
    }
    /* collapsed 시 컨텐츠 숨김 — 번호만 보이게.
       brand는 max-height 0으로 자리도 회수 (사이드바 상단 빈 공간 제거) */
    .reader-sidebar .sidebar-brand {
      max-height: 0;
      padding: 0;
      margin: 0;
      border: none;
      opacity: 0;
      overflow: hidden;
      pointer-events: none;
      transition: max-height 0.25s ease, opacity 0.18s ease,
                  padding 0.25s ease, margin 0.25s ease;
    }
    .reader-sidebar:hover .sidebar-brand {
      max-height: 70px;
      padding: 0 0.6rem 1rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
      opacity: 1;
      pointer-events: auto;
    }
    .reader-sidebar .sidebar-footer {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }
    .reader-sidebar:hover .sidebar-footer {
      opacity: 1;
      pointer-events: auto;
    }
    .reader-sidebar .sidebar-part {
      max-height: 0;
      opacity: 0;
      padding: 0 0.6rem;
      overflow: hidden;
      transition: max-height 0.25s ease, opacity 0.18s ease, padding 0.25s ease;
    }
    .reader-sidebar:hover .sidebar-part {
      max-height: 60px;
      opacity: 1;
      padding: 1rem 0.6rem 0.4rem;
    }
    .reader-sidebar .sidebar-item-title {
      display: none;
      white-space: nowrap;
    }
    .reader-sidebar:hover .sidebar-item-title {
      display: inline;
    }
    /* collapsed 상태에서 단원 항목 — 번호만 가운데 */
    .reader-sidebar .sidebar-item {
      justify-content: center;
      padding: 0.5rem 0.7rem;
    }
    .reader-sidebar:hover .sidebar-item {
      justify-content: flex-start;
    }
    .sidebar-brand {
      display: flex; align-items: baseline; gap: 0.5rem;
      padding: 0 0.6rem 1rem;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-brand-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.05rem; font-weight: 700;
      color: var(--text-primary);
      cursor: pointer;
    }
    .sidebar-brand-title:hover { color: var(--accent); }
    .sidebar-brand-sub {
      font-size: 0.68rem; color: var(--text-muted);
      letter-spacing: 0.06em;
    }
    .sidebar-part {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted);
      padding: 1rem 0.6rem 0.4rem;
      margin-top: 0.4rem;
    }
    .sidebar-part:first-of-type { margin-top: 0; }
    .sidebar-item {
      display: flex; align-items: baseline; gap: 0.7rem;
      padding: 0.45rem 0.7rem;
      border-radius: 6px; cursor: pointer;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
      line-height: 1.45;
    }
    .sidebar-item:hover { background: var(--bg-tint); color: var(--text-primary); }
    .sidebar-item.active {
      background: var(--bg-tint);
      color: var(--text-primary);
      font-weight: 600;
      box-shadow: inset 3px 0 0 var(--accent);
    }
    .sidebar-item.active .sidebar-item-num { color: var(--accent); }
    .sidebar-item-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: var(--text-muted);
      min-width: 1.6rem;
      flex-shrink: 0;
    }
    .sidebar-item-title {
      font-size: 0.83rem;
      flex: 1;
    }
    .sidebar-footer {
      margin-top: 1.5rem; padding: 1rem 0.6rem 0;
      border-top: 1px solid var(--border);
      display: flex; gap: 1rem;
      font-size: 0.72rem;
    }
    .sidebar-footer a {
      color: var(--text-muted); text-decoration: none;
      transition: color 0.2s;
    }
    .sidebar-footer a:hover { color: var(--text-primary); }

    /* ── 우측 페이지내 목차 (Outline) ── */
    .reader-outline {
      display: none;
      position: sticky; top: 0;
      height: 100vh; width: 240px;
      padding: 5rem 1.5rem 2rem 1rem;
      overflow-y: auto;
      font-size: 0.8rem;
    }
    .outline-title {
      font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted);
      padding-bottom: 0.6rem;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .outline-list { display: flex; flex-direction: column; gap: 0.1rem; }
    .outline-item {
      display: block;
      padding: 0.35rem 0.5rem;
      border-left: 2px solid transparent;
      color: var(--text-muted);
      cursor: pointer;
      line-height: 1.45;
      font-size: 0.78rem;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      text-decoration: none;
    }
    .outline-item:hover { color: var(--text-primary); }
    .outline-item.h3 { padding-left: 1.2rem; font-size: 0.74rem; }
    .outline-item.active {
      color: var(--text-primary);
      border-left-color: var(--accent);
      font-weight: 500;
    }

    /* ── Content Typography ── */
    .reader-content { font-size: 16.5px; line-height: 2.0; color: var(--text-primary); }

    .reader-content h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 2rem; font-weight: 700;
      margin-top: 3rem; margin-bottom: 1rem;
      line-height: 1.4; letter-spacing: -0.02em;
    }
    .reader-content h1:first-child { margin-top: 0; }

    .reader-content h2 {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.5rem; font-weight: 600;
      margin-top: 2.5rem; margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.4; letter-spacing: -0.01em;
    }

    .reader-content h3 {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1.15rem; font-weight: 700;
      margin-top: 2rem; margin-bottom: 0.8rem;
      line-height: 1.5;
    }

    .reader-content h4 {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1.05rem; font-weight: 700;
      margin-top: 1.5rem; margin-bottom: 0.6rem;
      color: var(--text-secondary);
    }

    .reader-content p {
      margin-bottom: 1.2rem;
    }

    .reader-content strong {
      font-weight: 700; color: #292524;
    }

    .reader-content a {
      color: var(--accent); text-decoration: underline;
      text-underline-offset: 3px; text-decoration-color: var(--border-light);
      transition: text-decoration-color 0.2s;
    }
    .reader-content a:hover { text-decoration-color: var(--accent); }

    .reader-content blockquote {
      border-left: 3px solid var(--border-light);
      padding: 1rem 1.5rem;
      background: var(--bg-tint);
      margin: 1.5rem 0;
      font-style: italic; font-size: 15px;
      line-height: 1.9;
      border-radius: 0 6px 6px 0;
    }
    .reader-content blockquote p { margin-bottom: 0.5rem; }
    .reader-content blockquote p:last-child { margin-bottom: 0; }

    .reader-content pre {
      background: var(--code-bg); color: var(--code-text);
      padding: 1.5rem; border-radius: 8px;
      overflow-x: auto; margin: 1.5rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px; line-height: 1.7;
      -webkit-overflow-scrolling: touch;
    }
    .reader-content pre code {
      background: none; padding: 0; font-size: inherit;
      color: inherit; border-radius: 0;
    }

    .reader-content code {
      background: var(--bg-tint);
      padding: 2px 6px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14.5px; color: var(--accent);
    }

    .reader-content table {
      width: 100%; border-collapse: collapse;
      margin: 1.5rem 0; font-size: 15px;
    }
    .reader-content thead th {
      background: var(--bg-tint);
      font-weight: 500; text-align: left;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid var(--border);
      font-size: 0.88rem;
    }
    .reader-content tbody td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      line-height: 1.7;
    }
    .reader-content tbody tr:last-child td { border-bottom: none; }

    .reader-content ul, .reader-content ol {
      padding-left: 1.5rem; margin-bottom: 1.2rem;
    }
    .reader-content li {
      margin-bottom: 0.5rem; line-height: 1.9;
    }

    .reader-content img {
      max-width: 100%; border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin: 1.5rem 0;
    }

    .reader-content hr {
      border: none; height: 1px;
      background: var(--border);
      margin: 2.5rem 0;
    }

    /* KaTeX */
    .reader-content .katex-display {
      margin: 1.5rem 0;
      padding: 0.8rem 0;
      overflow-x: auto;
    }

    /* 단원 시작 Hero 배너 */
    .ch-hero {
      margin: 0 -0.5rem 2.5rem;
      padding: 1.8rem 1.4rem 1.6rem;
      background: linear-gradient(135deg, #fafaf9 0%, #f5f5f4 100%);
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    .ch-hero-part {
      font-size: 0.68rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }
    .ch-hero-num {
      font-family: 'Noto Serif KR', serif;

    { label: 'Part IV — 종합',            chapters: [11, 12] },
    { label: 'Part V — 확장 팩터',        chapters: [13, 14] },
    { label: 'Part VI — 도구·부록',        chapters: [15, 16, 17] },
  ];

  const cache = {};
  let currentCh = null;
  let outlineObserver = null;

  // DOM
  const tocView      = document.getElementById('toc-view');
  const readerView   = document.getElementById('reader-view');
  const readerContent = document.getElementById('reader-content');
  const readerNav    = document.getElementById('reader-nav');
  const progressBar  = document.getElementById('progress-bar');
  const topbarTitle  = document.getElementById('topbar-title');
  const topbarNum    = document.getElementById('topbar-num');
  const drawerOverlay = document.getElementById('drawer-overlay');
  const tocDrawer    = document.getElementById('toc-drawer');
  const drawerList   = document.getElementById('drawer-list');
  const sidebarList  = document.getElementById('sidebar-list');
  const outlineList  = document.getElementById('outline-list');
  const ctxNum       = document.getElementById('ctx-num');
  const ctxTotal     = document.getElementById('ctx-total');
  const ctxTitle     = document.getElementById('ctx-title');
  const ctxFill      = document.getElementById('ctx-progress-fill');

  // marked config
  marked.setOptions({
    gfm: true, breaks: false,
  });

  // mermaid config (한 번만)
  if (window.mermaid) {
    mermaid.initialize({ startOnLoad: false, theme: 'default', securityLevel: 'loose' });
  }
  let mermaidCounter = 0;

  // Build drawer (모바일·태블릿)
  function buildDrawer() {
    drawerList.innerHTML = CHAPTERS.map(ch =>
      `<div class="toc-drawer-item" data-ch="${ch.num}">
        <span class="toc-drawer-num">${ch.displayNum}</span>
        <span>${ch.title}</span>
      </div>`
    ).join('');
    drawerList.addEventListener('click', e => {
      const item = e.target.closest('.toc-drawer-item');
      if (item) { openChapter(+item.dataset.ch); toggleDrawer(); }
    });
  }

  // 단원 num → Part 라벨
  function getPartLabel(num) {
    for (const p of PARTS) {
      if (p.chapters.includes(num)) return p.label;
    }
    return '';
  }

  // 단원 hero 배너 HTML 생성 (renderContent 첫 부분에 삽입)
  function buildChapterHero(ch, md) {
    const lines = md.split('\n').length;
    const minutes = Math.max(5, Math.round(lines / 80));
    return `<div class="ch-hero">
      <div class="ch-hero-part">${getPartLabel(ch.num)}</div>
      <div class="ch-hero-num">${ch.displayNum}</div>
      <h1 class="ch-hero-title">${ch.title}</h1>
      <div class="ch-hero-desc">${ch.desc || ''}</div>
      <div class="ch-hero-meta">
        <span>📖 약 ${minutes}분 분량</span>
        <span class="dot"></span>
        <span>${ch.num} / ${CHAPTERS.length}</span>
      </div>
    </div>`;
  }

  // Build home page chapter list (메인 페이지 카드 그리드)
  function buildHomeChapterList() {
    const container = document.getElementById('chapter-list');
    if (!container) return;
    let html = '';
    PARTS.forEach(part => {
      html += `<div class="part-group">
        <div class="part-label">${part.label}</div>
        <div class="chapter-grid">`;
      part.chapters.forEach(num => {
        const ch = CHAPTERS.find(c => c.num === num);
        if (!ch) return;
        const thumb = ch.thumb
          ? `<img src="${GITHUB_RAW}figures/${encodeURIComponent(ch.thumb)}" alt="${ch.title}" loading="lazy">`
          : `<div class="card-thumb-empty">${ch.displayNum}</div>`;
        const partName = part.label.split(' — ')[0];
        html += `<div class="chapter-card" data-ch="${ch.num}">
          <div class="card-thumb">${thumb}</div>
          <div class="card-info">
            <div class="card-num">${partName} · ${ch.displayNum}</div>
            <div class="card-title">${ch.title}</div>
            <div class="card-desc">${ch.desc || ''}</div>
          </div>
        </div>`;
      });
      html += `</div></div>`;
    });
    container.innerHTML = html;
    container.addEventListener('click', e => {
      const card = e.target.closest('.chapter-card');
      if (card) openChapter(+card.dataset.ch);
    });
  }

  // Build sidebar (데스크탑 좌측)
  function buildSidebar() {
    let html = '';
    PARTS.forEach(part => {
      html += `<div class="sidebar-part">${part.label}</div>`;
      part.chapters.forEach(num => {
        const ch = CHAPTERS.find(c => c.num === num);
        if (!ch) return;
        html += `<div class="sidebar-item" data-ch="${ch.num}">`
              + `<span class="sidebar-item-num">${ch.displayNum}</span>`
              + `<span class="sidebar-item-title">${ch.title}</span>`
              + `</div>`;
      });
    });
    sidebarList.innerHTML = html;
    sidebarList.addEventListener('click', e => {
      const item = e.target.closest('.sidebar-item');
      if (item) openChapter(+item.dataset.ch);
    });
  }

  // Build outline (데스크탑 우측, 페이지내 H2/H3)
  function buildOutline() {
    if (!outlineList) return;
    const headings = readerContent.querySelectorAll('h2, h3');
    if (!headings.length) {
      outlineList.innerHTML = '<div style="font-size:0.74rem;color:var(--text-muted);padding:0.5rem;">목차 없음</div>';
      if (outlineObserver) { outlineObserver.disconnect(); outlineObserver = null; }
      return;
    }
    let html = '';
    headings.forEach((h, i) => {
      if (!h.id) h.id = `sec-${i}`;
      const tag = h.tagName.toLowerCase();
      const text = h.textContent.trim();
      html += `<a class="outline-item ${tag}" data-target="${h.id}" href="#${h.id}">${text}</a>`;
    });
    outlineList.innerHTML = html;
    outlineList.querySelectorAll('.outline-item').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        const target = document.getElementById(el.dataset.target);
        if (target) {
          const offset = window.matchMedia('(min-width: 1024px)').matches ? 24 : 60;
          window.scrollTo({
            top: target.getBoundingClientRect().top + window.scrollY - offset,
            behavior: 'smooth'
          });
        }
      });
    });
    setupOutlineScrollSpy(headings);
  }

  function setupOutlineScrollSpy(headings) {
    if (outlineObserver) outlineObserver.disconnect();
    const items = outlineList.querySelectorAll('.outline-item');
    const map = new Map();
    items.forEach(el => map.set(el.dataset.target, el));
    let lastActive = null;
    outlineObserver = new IntersectionObserver(entries => {
      // 화면 안에 있는 가장 위 헤딩을 active로
      const visible = entries
        .filter(e => e.isIntersecting)
        .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (visible.length) {
        const id = visible[0].target.id;
        if (id !== lastActive) {
          items.forEach(el => el.classList.remove('active'));
          const el = map.get(id);
          if (el) {
            el.classList.add('active');
            // outline 내부 자동 스크롤
            el.scrollIntoView({ block: 'nearest' });
          }
          lastActive = id;
        }
      }
    }, { rootMargin: '-15% 0px -70% 0px', threshold: 0 });
    headings.forEach(h => outlineObserver.observe(h));
  }

  function highlightSidebar(num) {
    sidebarList.querySelectorAll('.sidebar-item').forEach(el => {
      el.classList.toggle('active', +el.dataset.ch === num);
    });
  }

  function toggleDrawer() {
    drawerOverlay.classList.toggle('open');
    tocDrawer.classList.toggle('open');
  }

  // Open chapter
  async function openChapter(num) {
    const ch = CHAPTERS.find(c => c.num === num);
    if (!ch) return;
    currentCh = num;

    // UI transition
    tocView.classList.add('hidden');
    readerView.classList.add('active');
    progressBar.classList.add('visible');
    window.scrollTo({ top: 0, behavior: 'instant' });

    // Update topbar (모바일·태블릿)
    topbarTitle.textContent = ch.title;
    topbarNum.textContent = `${ch.displayNum} / ${CHAPTERS.length}`;

    // Update context bar (데스크탑)
    ctxNum.textContent = ch.displayNum;
    ctxTotal.textContent = `/ ${CHAPTERS.length}`;
    ctxTitle.textContent = ch.title;
    ctxFill.style.width = `${(num / CHAPTERS.length) * 100}%`;

    // Update drawer active (모바일)
    drawerList.querySelectorAll('.toc-drawer-item').forEach(el => {
      el.classList.toggle('active', +el.dataset.ch === num);
    });

    // Update sidebar active (데스크탑)
    highlightSidebar(num);

    // URL
    history.pushState({ ch: num }, '', `?ch=${num}`);

    // Load content
    if (cache[num]) {
      renderContent(cache[num], ch);
    } else {
      readerContent.innerHTML = `<div class="loading-indicator"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div>`;
      try {
        const res = await fetch(GITHUB_RAW + encodeURIComponent(ch.file));
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();
        cache[num] = md;
        if (currentCh === num) renderContent(md, ch);
      } catch(e) {
        readerContent.innerHTML = `<p style="color:var(--text-muted);text-align:center;padding:4rem 0;">콘텐츠를 불러올 수 없습니다.</p>`;
      }
    }

    // Bottom nav
    renderNav(num);
  }

  function renderContent(md, ch) {
    // 1. 수식 보호 — marked가 $x_t$의 _t를 italic으로 먹는 걸 방지
    const mathStore = [];
    md = md.replace(/\$\$([\s\S]+?)\$\$/g, (_, c) => {
      mathStore.push({ display: true, content: c });
      return `@@KMATH_${mathStore.length - 1}@@`;
    });
    md = md.replace(/(?<!\\)\$([^\$\n]+?)\$/g, (_, c) => {
      mathStore.push({ display: false, content: c });
      return `@@KMATH_${mathStore.length - 1}@@`;
    });

    // 2. marked 렌더
    let html = marked.parse(md);

    // 3. 수식 placeholder 복원
    html = html.replace(/@@KMATH_(\d+)@@/g, (_, i) => {
      const m = mathStore[+i];
      return m.display ? `$$${m.content}$$` : `$${m.content}$`;
    });

    // 3-A. 본문 첫 H1 제거 (hero에 단원 제목 표시되므로 중복 방지)
    html = html.replace(/<h1[^>]*>[\s\S]*?<\/h1>/, '');

    // 3-B. Hero 배너 prepend
    if (ch) html = buildChapterHero(ch, md) + html;

    readerContent.innerHTML = html;

    // 4. 이미지 상대경로 → GitHub raw 절대경로
    readerContent.querySelectorAll('img').forEach(img => {
      const src = img.getAttribute('src');
      if (src && !/^https?:|^\/|^data:/.test(src)) {
        img.src = GITHUB_RAW + src.split('/').map(encodeURIComponent).join('/');
        img.loading = 'lazy';
      }
    });

    // 5. Mermaid 코드블록 → div.mermaid 변환
    const mermaidNodes = [];
    readerContent.querySelectorAll('pre > code.language-mermaid').forEach(code => {
      const def = code.textContent;
      const div = document.createElement('div');
      div.className = 'mermaid';
      div.id = `mermaid-${++mermaidCounter}`;
      div.textContent = def;
      code.parentNode.replaceWith(div);
      mermaidNodes.push(div);
    });
    if (mermaidNodes.length && window.mermaid) {
      mermaid.run({ nodes: mermaidNodes }).catch(err =>
        console.warn('[mermaid] render error:', err)
      );
    }

    // 6. KaTeX
    renderMathInElement(readerContent, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\[', right: '\\]', display: true },
        { left: '\\(', right: '\\)', display: false },
      ],
      throwOnError: false,
    });

    // 7. 우측 outline 빌드
    buildOutline();
  }

  function renderNav(num) {
    const prev = CHAPTERS.find(c => c.num === num - 1);
    const next = CHAPTERS.find(c => c.num === num + 1);
    readerNav.innerHTML = `
      <div class="reader-nav-card prev ${prev ? '' : 'empty'}" ${prev ? `onclick="openChapter(${prev.num})"` : ''}>
        ${prev ? `<div class="reader-nav-label">&#8592; Previous</div><div class="reader-nav-title">${prev.displayNum}. ${prev.title}</div>` : ''}
      </div>
      <div class="reader-nav-card next ${next ? '' : 'empty'}" ${next ? `onclick="openChapter(${next.num})"` : ''}>
        ${next ? `<div class="reader-nav-label">Next &#8594;</div><div class="reader-nav-title">${next.displayNum}. ${next.title}</div>` : ''}
      </div>
    `;
  }

  // Back to TOC
  window.goToToc = function() {
    readerView.classList.remove('active');
    tocView.classList.remove('hidden');
    progressBar.classList.remove('visible');
    progressBar.style.width = '0%';
    currentCh = null;
    if (outlineObserver) { outlineObserver.disconnect(); outlineObserver = null; }
    highlightSidebar(0);
    history.pushState(null, '', window.location.pathname);
    window.scrollTo({ top: 0, behavior: 'instant' });
  };

  // Make openChapter global for inline onclick
  window.openChapter = openChapter;
  window.toggleDrawer = toggleDrawer;

  // Reading progress
  window.addEventListener('scroll', () => {
    if (!readerView.classList.contains('active')) return;
    const h = document.documentElement.scrollHeight - window.innerHeight;
    progressBar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    if (!readerView.classList.contains('active')) return;
    if (e.key === 'ArrowRight' && currentCh < CHAPTERS.length) openChapter(currentCh + 1);
    if (e.key === 'ArrowLeft' && currentCh > 1) openChapter(currentCh - 1);
    if (e.key === 'Escape') {
      if (tocDrawer.classList.contains('open')) toggleDrawer();
      else goToToc();
    }
  });

  // (Chapter list 클릭 핸들러는 buildHomeChapterList 내부에서 등록됨)

  // Popstate
  window.addEventListener('popstate', e => {
    if (e.state && e.state.ch) openChapter(e.state.ch);
    else goToToc();
  });

  // 이미지/Mermaid 라이트박스 (delegation, 본문 어디서든 클릭 시)
  function openLightbox(innerHTML) {
    const overlay = document.createElement('div');
    overlay.className = 'img-lightbox';
    overlay.innerHTML = innerHTML +
      '<button class="img-lightbox-close" aria-label="닫기">×</button>';
    const close = () => overlay.remove();
    overlay.addEventListener('click', close);
    document.body.appendChild(overlay);
    const onEsc = ev => {
      if (ev.key === 'Escape') {
        close();
        document.removeEventListener('keydown', onEsc);
      }
    };
    document.addEventListener('keydown', onEsc);
  }

  function setupImageLightbox() {
    document.addEventListener('click', e => {
      // 이미 lightbox 안 클릭이면 무시 (overlay click 핸들러가 처리)
      if (e.target.closest('.img-lightbox')) return;
      // 1) 본문 이미지
      const img = e.target.closest('.reader-content img');
      if (img) {
        e.preventDefault();
        openLightbox(`<img src="${img.src}" alt="${(img.alt || '').replace(/"/g, '&quot;')}">`);
        return;
      }
      // 2) 본문 Mermaid 다이어그램 — SVG outerHTML 복제
      const merm = e.target.closest('.reader-content .mermaid');
      if (merm) {
        const svg = merm.querySelector('svg');
        if (svg) {
          e.preventDefault();
          openLightbox(`<div class="lb-svg-wrap">${svg.outerHTML}</div>`);
        }
      }
    });
  }

  // Init
  buildDrawer();
  buildSidebar();
  buildHomeChapterList();
  setupImageLightbox();
  const params = new URLSearchParams(window.location.search);
  const initCh = params.get('ch');
  if (initCh && +initCh >= 1 && +initCh <= CHAPTERS.length) {
    openChapter(+initCh);
  }
})();
</script>
</body>
</html>
