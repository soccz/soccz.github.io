<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#faf7f2"/>

  <!-- Subtle dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="rgba(196,114,78,0.08)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Warm gradient overlay bottom -->
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf7f2" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f5f0e8" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#fade)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="4" fill="#c4724e" opacity="0.5"/>

  <!-- Logo: soccz. -->
  <text
    x="120"
    y="310"
    font-family="'Space Grotesk', 'Arial Black', Arial, sans-serif"
    font-size="110"
    font-weight="700"
    fill="#1a1410"
    letter-spacing="-4"
  >soccz</text>
  <text
    x="553"
    y="310"
    font-family="'Space Grotesk', 'Arial Black', Arial, sans-serif"
    font-size="110"
    font-weight="700"
    fill="#c4724e"
  >.</text>

  <!-- Subtitle -->
  <text
    x="122"
    y="375"
    font-family="'Inter', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    fill="#96887a"
    letter-spacing="1"
  >Finance &amp; AI Research</text>

  <!-- Divider -->
  <rect x="120" y="405" width="60" height="2" fill="#c4724e" opacity="0.6"/>

  <!-- Bottom label -->
  <text
    x="120"
    y="455"
    font-family="'Inter', Arial, sans-serif"
    font-size="20"
    font-weight="400"
    fill="#b5a898"
    letter-spacing="0.5"
  >soccz.github.io</text>
</svg>
