<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>soccz — Finance & AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #faf7f2;
      --bg-warm: #f5f0e8;
      --bg-dot: rgba(196,114,78,0.06);
      --surface: #ffffff;
      --surface-warm: #fefcf9;
      --surface-hover: #fffdfb;
      --border: #e5ddd3;
      --border-light: #eeE7de;
      --border-hover: #d4c8b8;
      --text: #1a1410;
      --text-secondary: #5c4f42;
      --text-muted: #96887a;
      --text-light: #b5a898;
      --accent: #c4724e;
      --accent-light: #fdf0ea;
      --accent-hover: #b06240;
      --accent-soft: #e8a98a;
      --accent-glow: rgba(196,114,78,0.08);
      --tag-bg: #f0e8de;
      --tag-text: #6d5e4e;
      --finance: #c4724e;
      --finance-light: #fdf0ea;
      --finance-bg: #fef8f4;
      --research: #5a7a96;
      --research-light: #edf3f8;
      --research-bg: #f5f8fb;
      --web: #5a8a6a;
      --web-light: #eef6f1;
      --web-bg: #f4faf6;
      --data: #7a6a9a;
      --data-light: #f1eef7;
      --data-bg: #f7f5fb;
      --note: #8a7a6a;
      --note-light: #f0ece4;
      --note-bg: #f9f6f2;
      --side: #6a8a8a;
      --side-light: #eef4f4;
      --side-bg: #f4f9f9;
      --sidebar-w: 260px;
      --header-h: 64px;
      --max-w: 1200px;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --shadow-sm: 0 1px 2px rgba(26,20,16,0.05);
      --shadow-md: 0 4px 16px rgba(26,20,16,0.07);
      --shadow-lg: 0 8px 32px rgba(26,20,16,0.09);
      --shadow-warm: 0 8px 28px rgba(196,114,78,0.1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* Subtle dot pattern background */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px);
      background-size: 24px 24px;
      pointer-events: none;
      z-index: 0;
    }

    ::selection { background: var(--accent-light); color: var(--accent); }

    /* ======== HEADER ======== */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(250,247,242,0.88);
      backdrop-filter: blur(16px) saturate(1.3);
      -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border-bottom: 1px solid var(--border-light);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 32px;
      transition: box-shadow 0.3s;
    }
    header.scrolled { box-shadow: 0 1px 12px rgba(26,20,16,0.08); }

    .header-inner {
      width: 100%;
      max-width: var(--max-w);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.8px;
      transition: opacity 0.2s;
    }
    .logo:hover { opacity: 0.7; }
    .logo .dot { color: var(--accent); font-weight: 700; }

    .nav-links {
      display: flex;
      gap: 4px;
      align-items: center;
    }
    .nav-links a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      padding: 7px 16px;
      border-radius: 8px;
      transition: all 0.2s;
      letter-spacing: -0.2px;
      text-transform: uppercase;
      font-family: 'Space Grotesk', sans-serif;
    }
    .nav-links a:hover { background: var(--accent-light); color: var(--accent); }
    .nav-links a.active {
      background: var(--text);
      color: #fff;
    }
    .nav-links .gh-link {
      padding: 7px 9px;
      display: flex;
      align-items: center;
      margin-left: 6px;
      border-radius: 8px;
      color: var(--text-muted);
      text-transform: none;
    }
    .nav-links .gh-link:hover { background: var(--tag-bg); color: var(--text); }
    .nav-links .gh-link svg { width: 18px; height: 18px; }

    /* ======== PAGE CONTAINERS ======== */
    .page {
      display: none;
      max-width: var(--max-w);
      margin: 0 auto;
      padding-top: var(--header-h);
      min-height: calc(100vh - var(--header-h));
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.35s ease, transform 0.35s ease;
      position: relative;
      z-index: 1;
    }
    .page.active {
      display: flex;
      opacity: 1;
      transform: translateY(0);
    }

    /* ======== HOME PAGE ======== */
    .home {
      flex-direction: column;
      align-items: center;
      padding: calc(var(--header-h) + 16px) 24px 0;
      min-height: auto;
    }

    /* Hero section */
    .hero {
      position: relative;
      width: 100%;
      max-width: 700px;
      text-align: center;
      padding: 40px 32px 32px;
      margin-bottom: 24px;
    }

    .hero-label {
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 6px 16px;
      border-radius: 4px;
      margin-bottom: 32px;
    }

    .hero h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -2.5px;
      line-height: 1.1;
      margin-bottom: 20px;
      color: var(--text);
    }
    .hero h1 .accent {
      color: var(--accent);
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-secondary);
      font-weight: 300;
      line-height: 1.9;
      margin-bottom: 36px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }
    .hero-tag {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 3px;
      color: var(--text-muted);
      border: 1px solid var(--border);
      letter-spacing: 0.3px;
    }

    /* Decorative divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      width: 100%;
      max-width: 960px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* Featured project */
    /* featured section removed */

    /* Category cards grid */
    .section-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 18px;
      width: 100%;
      max-width: 960px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      width: 100%;
      max-width: 960px;
      margin-bottom: 20px;
    }

    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px 20px 16px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.25,0.46,0.45,0.94);
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
      overflow: hidden;
    }
    .cat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 3px;
      opacity: 0;
      transition: opacity 0.25s;
    }
    .cat-card.finance-card::before, .cat-card.project-card::before { background: var(--finance); }
    .cat-card.research-card::before { background: var(--research); }
    .cat-card.web-card::before { background: var(--web); }
    .cat-card.data-card::before { background: var(--data); }
    .cat-card.note-card::before { background: var(--note); }
    .cat-card.side-card::before { background: var(--side); }
    .cat-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
    }
    .cat-card:hover::before { opacity: 1; }

    .cat-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .cat-card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.3s;
    }
    .cat-card:hover .cat-card-icon { transform: scale(1.06); }
    .cat-card-icon svg { width: 20px; height: 20px; }
    .cat-card-icon.finance { background: var(--finance-light); color: var(--finance); }
    .cat-card-icon.research { background: var(--research-light); color: var(--research); }
    .cat-card-icon.web { background: var(--web-light); color: var(--web); }
    .cat-card-icon.data { background: var(--data-light); color: var(--data); }
    .cat-card-icon.note { background: var(--note-light); color: var(--note); }
    .cat-card-icon.side { background: var(--side-light); color: var(--side); }

    .cat-card-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.4px;
    }
    .cat-card-count {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
      margin-top: 1px;
    }
    .cat-card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      line-height: 1.5;
    }
    .cat-card-repos {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .cat-card-repo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--text-muted);
      border: 1px solid var(--border-light);
      transition: all 0.2s;
    }
    .cat-card:hover .cat-card-repo {
      border-color: var(--border);
    }

    /* ======== BLOG PAGE ======== */
    .blog-layout { display: flex; }

    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      padding: 28px 14px 28px 18px;
      position: sticky;
      top: var(--header-h);
      height: calc(100vh - var(--header-h));
      overflow-y: auto;
      border-right: 1px solid var(--border-light);
    }
    .sidebar::-webkit-scrollbar { width: 0; }

    .sidebar-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-light);
      margin-bottom: 12px;
      padding-left: 12px;
    }
    .sidebar-list { list-style: none; }
    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 9px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 500;
      user-select: none;
      margin-bottom: 2px;
      letter-spacing: -0.2px;
    }
    .sidebar-item:hover {
      background: var(--accent-light);
      color: var(--accent);
    }
    .sidebar-item.active {
      background: var(--text);
      color: #fff;
    }
    .sidebar-item.active .sb-count {
      background: rgba(255,255,255,0.18);
      color: #fff;
    }
    .sidebar-item svg { width: 15px; height: 15px; flex-shrink: 0; opacity: 0.5; }
    .sidebar-item:hover svg { opacity: 0.8; }
    .sidebar-item.active svg { opacity: 1; }
    .sb-count {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      background: var(--tag-bg);
      color: var(--text-light);
      padding: 2px 8px;
      border-radius: 5px;
      min-width: 26px;
      text-align: center;
    }

    .blog-main {
      flex: 1;
      padding: 32px 40px 60px;
      min-width: 0;
    }
    .blog-header {
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-light);
    }
    .blog-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 4px;
    }
    .blog-desc {
      font-size: 14px;
      color: var(--text-muted);
      letter-spacing: -0.1px;
    }

    .posts { display: flex; flex-direction: column; gap: 10px; }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 20px 24px;
      transition: all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      position: relative;
    }
    .post-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 2px;
      opacity: 0;
      transition: opacity 0.2s;
      border-radius: 2px 0 0 2px;
    }
    .post-card:hover {
      border-color: var(--border-hover);
      box-shadow: var(--shadow-md);
      transform: translateX(2px);
    }
    .post-card:hover::before { opacity: 1; }
    .post-card.finance-post::before, .post-card.project-post::before { background: var(--finance); }
    .post-card.research-post::before { background: var(--research); }
    .post-card.web-post::before { background: var(--web); }
    .post-card.data-post::before { background: var(--data); }
    .post-card.note-post::before { background: var(--note); }
    .post-card.side-post::before { background: var(--side); }

    .post-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .post-badge {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 3px 9px;
      border-radius: 5px;
    }
    .post-badge.finance, .post-badge.project { background: var(--finance-light); color: var(--finance); }
    .post-badge.research { background: var(--research-light); color: var(--research); }
    .post-badge.web { background: var(--web-light); color: var(--web); }
    .post-badge.data { background: var(--data-light); color: var(--data); }
    .post-badge.note { background: var(--note-light); color: var(--note); }
    .post-badge.side { background: var(--side-light); color: var(--side); }

    .post-date {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 400;
      font-variant-numeric: tabular-nums;
    }
    .post-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: -0.4px;
      line-height: 1.35;
    }
    .post-desc {
      font-size: 13.5px;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .post-bottom {
      text-align: right;
      margin-top: 8px;
    }
    .post-gh {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    .post-gh:hover { color: var(--text); background: var(--tag-bg); }
    .post-gh svg { width: 14px; height: 14px; }
    /* ======== SKELETON ======== */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-warm) 25%, var(--border-light) 50%, var(--bg-warm) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.8s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skel-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 20px 24px;
    }
    .skel-line { height: 12px; margin-bottom: 12px; border-radius: 4px; }
    .skel-line.w20 { width: 18%; }
    .skel-line.w60 { width: 55%; }
    .skel-line.w80 { width: 75%; }
    .skel-line.w40 { width: 35%; }

    /* Home skeleton */
    .skel-cat-card {
      background: var(--surface);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-lg);
      padding: 24px;
    }
    .skel-cat-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .skel-cat-icon { width: 44px; height: 44px; border-radius: 10px; }
    .skel-cat-lines { flex: 1; }

    /* ======== ANIMATIONS ======== */
    .fade-in {
      opacity: 0;
      transform: translateY(10px);
      animation: fadeIn 0.45s cubic-bezier(0.25,0.46,0.45,0.94) forwards;
    }
    @keyframes fadeIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
    }
    .fade-up.visible {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s cubic-bezier(0.25,0.46,0.45,0.94), transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94);
    }

    /* ======== FOOTER ======== */
    footer {
      text-align: center;
      padding: 24px 24px 32px;
      border-top: 1px solid var(--border-light);
      margin-top: 32px;
    }
    .footer-inner {
      max-width: 480px;
      margin: 0 auto;
    }
    .footer-brand {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    .footer-brand .dot { color: var(--accent); }
    .footer-text {
      font-size: 13px;
      color: var(--text-light);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .footer-link {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
      letter-spacing: -0.2px;
    }
    .footer-link:hover { color: var(--accent); }
    .footer-copy {
      font-size: 11px;
      color: var(--text-light);
      margin-top: 18px;
    }

    /* ======== MOBILE SIDEBAR ======== */
    .sidebar-toggle {
      display: none;
      position: fixed;
      bottom: 24px; left: 24px;
      z-index: 200;
      width: 48px; height: 48px;
      border-radius: 12px;
      background: var(--text);
      color: #fff;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(26,20,16,0.22);
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }
    .sidebar-toggle:active { transform: scale(0.92); }
    .sidebar-toggle svg { width: 18px; height: 18px; }
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,20,16,0.3);
      backdrop-filter: blur(4px);
      z-index: 149;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .sidebar-overlay.open { display: block; opacity: 1; }

    /* ======== RESPONSIVE ======== */
    @media (max-width: 900px) {
      .categories-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    }

    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .sidebar {
        position: fixed;
        left: -300px;
        top: var(--header-h);
        z-index: 150;
        background: var(--surface-warm);
        transition: left 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
        box-shadow: 8px 0 32px rgba(26,20,16,0.1);
        width: 272px;
      }
      .sidebar.open { left: 0; }

let allRepos = [];
let currentCat = null;

function getCat(name) {
  for (const [k, c] of Object.entries(CATEGORIES)) {
    if (c.match.includes(name)) return k;
  }
  return null;
}

function fmtDate(s) {
  const d = new Date(s);
  const diff = Math.floor((new Date() - d) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '어제';
  if (diff < 7) return diff + '일 전';
  if (diff < 30) return Math.floor(diff / 7) + '주 전';
  if (diff < 365) return Math.floor(diff / 30) + '개월 전';
  return d.toLocaleDateString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' });
}

function showPage(page) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = 'none';
  });
  const target = document.getElementById('page-' + page);
  target.style.display = 'flex';
  requestAnimationFrame(() => {
    target.classList.add('active');
  });
  document.querySelectorAll('.nav-links a:not(.gh-link)').forEach(a => a.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');
  if (page === 'blog') renderSidebar(currentCat);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* renderFeatured removed */

function renderCatGrid() {
  const grid = document.getElementById('catGrid');
  const counts = {};
  for (const k of Object.keys(CATEGORIES)) counts[k] = 0;
  allRepos.forEach(r => { const c = getCat(r.name); if (c) counts[c]++; });

  grid.innerHTML = Object.entries(CATEGORIES).map(([k, cat], idx) => {
    const repos = allRepos.filter(r => getCat(r.name) === k).slice(0, 4);
    return `<div class="cat-card ${k}-card fade-in" style="animation-delay:${idx * 0.07}s" onclick="currentCat='${k}';showPage('blog')">
      <div class="cat-card-header">
        <div class="cat-card-icon ${cat.color}">${cat.icon}</div>
        <div>
          <div class="cat-card-title">${cat.label}</div>
          <div class="cat-card-count">${counts[k]}개 프로젝트</div>
        </div>
      </div>
      <div class="cat-card-desc">${cat.desc}</div>
      <div class="cat-card-repos">
        ${repos.map(r => `<span class="cat-card-repo">${r.name}</span>`).join('')}
        ${counts[k] > 4 ? `<span class="cat-card-repo">+${counts[k] - 4}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function renderSidebar(catKey) {
  currentCat = catKey;
  const list = document.getElementById('sidebarList');
  const counts = {};
  let total = 0;
  for (const k of Object.keys(CATEGORIES)) counts[k] = 0;
  allRepos.forEach(r => { const c = getCat(r.name); if (c) { counts[c]++; total++; } });

  let html = `<li class="sidebar-item ${!catKey ? 'active' : ''}" onclick="renderSidebar(null)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    All <span class="sb-count">${total}</span></li>`;
  for (const [k, cat] of Object.entries(CATEGORIES)) {
    if (!counts[k]) continue;
    html += `<li class="sidebar-item ${catKey === k ? 'active' : ''}" onclick="renderSidebar('${k}')">
      ${cat.icon} ${cat.label} <span class="sb-count">${counts[k]}</span></li>`;
  }
  list.innerHTML = html;
  renderPosts(catKey);
}

function renderPosts(catKey) {
  const el = document.getElementById('posts');
  const t = document.getElementById('blogTitle');
  const d = document.getElementById('blogDesc');
  if (catKey && CATEGORIES[catKey]) {
    t.textContent = CATEGORIES[catKey].label;
    d.textContent = CATEGORIES[catKey].desc;
  } else {
    t.textContent = 'All Posts';
    d.textContent = '모든 프로젝트와 연구 기록';
  }

  const dateKey = allRepos[0]?.pushed_at ? 'pushed_at' : 'pushedAt';
  const list = allRepos
    .filter(r => { const c = getCat(r.name); return c && (catKey ? c === catKey : true); })
    .sort((a, b) => new Date(b[dateKey]) - new Date(a[dateKey]));

  if (!list.length) {
    el.innerHTML = '<div style="text-align:center;padding:80px 0;color:var(--text-muted);font-size:14px">프로젝트가 없습니다.</div>';
    return;
  }

  el.innerHTML = list.map((r, i) => {
    const cat = getCat(r.name);
    const lang = r.language || r.primaryLanguage?.name;
    const lc = LANG_COLORS[lang] || '#ccc';
    const PROJECT_PAGES = {
      'market-impact-analysis': '/projects/market-impact/',
      'boundarybench': '/projects/boundarybench/',
      'asset-management-guide': '/projects/asset-management/',
      'fin-momentum': '/projects/fin-momentum/',
      'tactical-factor-allocation': '/projects/tactical-factor-allocation/',
      'CBAM': '/projects/cbam/',
      'Chrono-Trader-v2': '/projects/chrono-trader-v2/',
      'fomc': '/projects/fomc/',
      'bit_sector': '/projects/bit-sector/',
      'bit_test': '/projects/bit-test/',
      'finance_semiconductor': '/projects/finance-semiconductor/',
      'HIGAN': '/projects/higan/',
      'finance-note': '/projects/finance-note/',
      'FF3': '/projects/ff3/',
      'RCNN_test': '/projects/rcnn-test/',
      'MC_order': '/projects/mc-order/',
      'forjp': '/projects/forjp/',
      'naverAPI': '/projects/naverapi/',
      'review_chatbot': '/projects/review-chatbot/',
      'son_data': '/projects/son-data/',
      'NeuroTraffic-DT': '/projects/neurotraffic-dt/',
      'night-shift-escape': '/projects/night-shift-escape/',
      'self_exercise': '/projects/self-exercise/',
      'kaggle_test': '/projects/kaggle-test/',
      'Daily-report': '/projects/daily-report/',
      'young-and-home': '/projects/young-and-home/'
    };
    const page = PROJECT_PAGES[r.name];
    const url = page || `https://github.com/soccz/${r.name}`;
    const desc = r.description || DESCS[r.name] || '';
    const openInNewTab = !page;
    const githubUrl = `https://github.com/soccz/${r.name}`;
    return `<div class="post-card ${cat}-post fade-in" role="link" tabindex="0" onclick="openPost('${url}', ${openInNewTab})" onkeydown="handlePostKey(event, '${url}', ${openInNewTab})" style="animation-delay:${i * 0.04}s">
      <div class="post-top">
        <span class="post-badge ${cat}">${CATEGORIES[cat]?.label || ''}</span>

      <div class="post-title">${r.name}</div>
      <div class="post-desc">${desc}</div>
      <div class="post-bottom"><span class="post-gh" role="link" tabindex="0" onclick="event.stopPropagation();openPost('${githubUrl}', true)" onkeydown="handleExternalKey(event, '${githubUrl}')"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>GitHub</span></div>
    </div>`;
  }).join('');
}

function openPost(url, openInNewTab) {
  if (openInNewTab) {
    window.open(url, '_blank', 'noopener');
    return;
  }
  window.location.href = url;
}

function handlePostKey(event, url, openInNewTab) {
  if (event.key !== 'Enter' && event.key !== ' ') return;
  event.preventDefault();
  openPost(url, openInNewTab);
}

function handleExternalKey(event, url) {
  if (event.key !== 'Enter' && event.key !== ' ') return;
  event.preventDefault();
  event.stopPropagation();
  openPost(url, true);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('open');
}

// Header scroll effect
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const header = document.querySelector('header');
  if (window.scrollY > 20) header.classList.add('scrolled');
  else header.classList.remove('scrolled');
  lastScroll = window.scrollY;
});

// Scroll-triggered fade-in for home page elements
function initScrollObserver() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

  document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
}

// Close sidebar on resize
window.addEventListener('resize', () => {
  if (window.innerWidth > 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }
});

async function init() {
  try {
    const res = await fetch('https://api.github.com/users/soccz/repos?per_page=100&sort=pushed');
    if (!res.ok) throw new Error('API error');
    allRepos = await res.json();
  } catch (e) {
    allRepos = [];
  }
  renderCatGrid();
  if (!allRepos.length) {
    document.getElementById('catGrid').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px;grid-column:1/-1">GitHub API에서 데이터를 불러오지 못했습니다.</div>';
  }
  initScrollObserver();
}

// Initial fade-up for hero
requestAnimationFrame(() => {
  document.querySelectorAll('.fade-up').forEach((el, i) => {
    el.style.transitionDelay = (i * 0.1) + 's';
  });
});

init();
</script>
</body>
</html>
